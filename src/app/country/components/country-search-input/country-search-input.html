<section class="flex grow gap-2 mt-2">
  <input type="text" class="input input-bordered mr-2 w-56" [placeholder]="placeholder()" autofocus name="" id=""
    #txtSearch (keyup.enter)="value.emit(txtSearch.value)" (keyup)="inputValue.set(txtSearch.value)" [value]="inputValue()"/>
  <button class="btn btn-primary bg-orange-800" (click)="value.emit(txtSearch.value)">Search</button>

</section>
