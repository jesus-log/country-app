
@if (countryResource.error()) {
<app-not-found></app-not-found>
}

@if(countryResource.isLoading()){
  <h1 class="text-3xl">Cargando ...</h1>
}

@if(countryResource.hasValue()){
<country-information class="h-[calc(100vh-172px)]  md:h-[calc(100vh-188px)] flex justify-center" [country]="countryResource.value()" ></country-information>
}
