<div class="px-4 py-4 w-full">
  <h1 class="text-2xl">Por región</h1>
  <h3 class="text-lg">Seleccione una región</h3>

  @for (region of regions; track $index) {
    <button class="btn mr-2 mt-1 w-[70px]" [class.bg-orange-800]="regionSelected()===region" (click)="regionSelected.set(region)">{{region}}</button>
  }

  <country-list
   [countries]="countryResources.value() ?? []"
   [errorMessage]="requestError()"
   [isEmpty]="countryResources.value()?.length == 0"
   [isLoading]="countryResources.isLoading()"
   />
</div>
